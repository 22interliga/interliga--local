<script>
const CATS={todos:'Todos',mercado:'🛒 Mercados',moda:'👗 Moda',pet:'🐾 Pets',servico:'🔧 Serviços',alimentacao:'🍽️ Alimentação',saude:'💊 Saúde',beleza:'💅 Beleza',eletro:'📱 Eletrônicos',otica:'👓 Óticas'};
const CL={mercado:'Mercado',moda:'Moda',pet:'Pet',servico:'Serviços',alimentacao:'Alimentação',saude:'Saúde',beleza:'Beleza',eletro:'Eletrônicos',otica:'Ótica'};
const PL={gratis:{label:'Grátis',cor:'#6B7A99',mp:0,preco:0},basico:{label:'Básico',cor:'#1270C2',mp:5,preco:29},premium:{label:'Premium',cor:'#7C3AED',mp:10,preco:59}};
const EM=['🛒','👗','🐾','🔧','🍽️','💊','💅','📱','👓','🏪','💈','🐶','🍕','🥩','🧴','👟','💻','🎂','🌿','🧹','📦','🎁'];
let US=JSON.parse(localStorage.getItem('il_u')||'[]');
let LJ=JSON.parse(localStorage.getItem('il_l')||'[]');
let UA=null,CAT='todos',VCli='home',PEI=null;
if(!US.length){US=[{id:'u1',nome:'Miquéias',wpp:'71981899571',senha:'interliga2025',tipo:'admin'},{id:'u2',nome:'Ótica Lclass',wpp:'71981899572',senha:'lclass123',tipo:'lojista',lojaId:'l2'}];sU();}
if(!LJ.length){LJ=[
{id:'l1',nome:'Mais Supermercados',nf:'Mais Supermercados',cat:'mercado',emoji:'🛒',logo:'',cidade:'Madre de Deus',end:'Av. Central, Centro',wpp:'71981890001',insta:'@maissupermercados',abre:'07:00',fecha:'21:00',desc:'Supermercado completo.',plano:'premium',ativo:true,dest:true,views:142,cliques:38,posts:[{nome:'Frango kg',desc:'Resfriado',preco:'8.99',ant:'',promo:false,emoji:'🍗',img:''},{nome:'Arroz 5kg',desc:'Tipo 1',preco:'19.90',ant:'24.90',promo:true,emoji:'🌾',img:''}]},
{id:'l2',nome:'Ótica Lclass',nf:'Lclass Óptica',cat:'otica',emoji:'👓',logo:'',cidade:'Madre de Deus',end:'Rua Principal, Centro',wpp:'71981899571',insta:'@oticalclass',abre:'08:00',fecha:'18:00',desc:'Óculos de grau, solar e lentes.',plano:'basico',ativo:true,dest:false,views:89,cliques:21,posts:[{nome:'Óculos Grau',desc:'Armações variadas',preco:'89.00',ant:'',promo:false,emoji:'👓',img:''},{nome:'Lentes Anti-Reflexo',desc:'Par completo',preco:'149.00',ant:'199.00',promo:true,emoji:'✨',img:''}]},
{id:'l3',nome:'Pet Amor',nf:'Pet Amor',cat:'pet',emoji:'🐾',logo:'',cidade:'São Francisco do Conde',end:'Av. Principal, 123',wpp:'71999990000',insta:'@petamor',abre:'08:00',fecha:'17:00',desc:'Rações, banho e tosa.',plano:'gratis',ativo:true,dest:false,views:33,cliques:8,posts:[]}
];sL();}
function sU(){localStorage.setItem('il_u',JSON.stringify(US));}
function sL(){localStorage.setItem('il_l',JSON.stringify(LJ));}
function ab(a,f){const n=new Date(),h=n.getHours()*60+n.getMinutes();const[ah,am]=a.split(':').map(Number),[fh,fm]=f.split(':').map(Number);return h>=ah*60+am&&h<fh*60+fm;}
function iT(id){document.querySelectorAll('.tela').forEach(t=>t.classList.remove('ativa'));document.getElementById(id).classList.add('ativa');}
function aM(id){document.getElementById(id).classList.add('open');}
function fM(id){document.getElementById(id).classList.remove('open');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
function wpp(num,nome){window.open('https://wa.me/55'+num.replace(/\D/g,'')+'?text='+encodeURIComponent('Olá! Vi *'+nome+'* no Interliga Local! 😊'),'_blank');}
function sE(el,id){el.closest('.eg').querySelectorAll('.eo').forEach(e=>e.classList.remove('sel'));el.classList.add('sel');document.getElementById(id).value=el.textContent;}
function imgUp(ev,iid,pid){const f=ev.target.files[0];if(!f)return;if(f.size>2097152){toast('⚠️ Máx 2MB.');return;}const r=new FileReader();r.onload=e=>{document.getElementById(iid).value=e.target.result;const p=document.getElementById(pid);if(p)p.innerHTML='<img src="'+e.target.result+'">';};r.readAsDataURL(f);}
function escolherTipo(t){if(t==='cliente'){UA={tipo:'cliente',nome:'Explorador',id:'anon'};iT('telaCliente');rCli();return;}document.getElementById('bTipo').style.display='none';document.getElementById('bAuth').style.display='block';}
function voltarTipo(){document.getElementById('bTipo').style.display='block';document.getElementById('bAuth').style.display='none';}
function setATab(t,btn){document.querySelectorAll('.atab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.getElementById('fE').style.display=t==='e'?'block':'none';document.getElementById('fC').style.display=t==='c'?'block':'none';document.getElementById('alink').style.display=t==='e'?'block':'none';}
function login(){const u=document.getElementById('eu').value.trim(),s=document.getElementById('es').value;if(!u||!s){toast('⚠️ Preencha os campos.');return;}const usr=US.find(x=>(x.wpp===u.replace(/\D/g,'')||u==='admin'||u===x.nome)&&x.senha===s);if(!usr){toast('❌ Usuário ou senha incorretos.');return;}UA=usr;if(usr.tipo==='admin'){iT('telaAdmin');rAdm('lojas');}else if(usr.tipo==='lojista'){const lj=LJ.find(l=>l.id===usr.lojaId);if(lj){const av=document.getElementById('avLoj');if(lj.logo){av.innerHTML='<img src="'+lj.logo+'">';}else av.textContent=lj.emoji;}iT('telaLojista');rLoj('dash');}else{iT('telaCliente');rCli();}}
function cadastrar(){const n=document.getElementById('cn').value.trim(),w=document.getElementById('cw').value.replace(/\D/g,''),s=document.getElementById('cs').value;if(!n||!w||!s){toast('⚠️ Preencha todos os campos.');return;}if(US.find(u=>u.wpp===w)){toast('⚠️ WhatsApp já cadastrado.');return;}const nv={id:'u'+Date.now(),nome:n,wpp:w,senha:s,tipo:'lojista',lojaId:null};US.push(nv);sU();UA=nv;iT('telaLojista');rLoj('dash');toast('✅ Conta criada! Cadastre sua loja.');setTimeout(()=>cadLoja(false),800);}
function sair(){UA=null;iT('telaLogin');document.getElementById('bTipo').style.display='block';document.getElementById('bAuth').style.display='none';}
function gLj(){return UA?LJ.find(l=>l.id===UA.lojaId)||null:null;}
function setTab(c,btn){CAT=c;document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');rCli();}
function setVCli(v,btn){VCli=v;document.querySelectorAll('#telaCliente .bni').forEach(b=>b.classList.remove('active'));btn.classList.add('active');rCli();}
function setVLoj(v,btn){document.querySelectorAll('#telaLojista .bni').forEach(b=>b.classList.remove('active'));btn.classList.add('active');rLoj(v);}
function setVAdm(v,btn){document.querySelectorAll('#telaAdmin .bni').forEach(b=>b.classList.remove('active'));btn.classList.add('active');rAdm(v);}

function cCard(l){const o=ab(l.abre,l.fecha);const p=PL[l.plano]||PL.gratis;const nf=l.nf||l.nome;return'<div class="card" onclick="vDet(\''+l.id+'\')">'+'<div class="clogo">'+(l.logo?'<img src="'+l.logo+'">':'<div class="clogo-e">'+l.emoji+'</div>')+(l.dest?'<div class="bd-dest">⭐ Destaque</div>':'')+'<div class="bd-pl bp-'+(l.plano||'gratis')+'">'+p.label+'</div>'+(l.nf&&l.logo?'<div class="clogo-ft"><div class="clogo-ft-t">'+nf+'</div></div>':'')+'</div>'+'<div class="cb"><div class="cn">'+l.nome+'</div>'+(l.nf&&l.nf!==l.nome?'<div class="cf">'+l.nf+'</div>':'')+'<div class="cc">'+(CL[l.cat]||l.cat)+' · '+l.cidade+'</div>'+'<div class="cft"><span class="'+(o?'ba':'bfe')+'">'+(o?'Aberto':'Fechado')+'</span>'+'<button class="bwpp" onclick="event.stopPropagation();rc(\''+l.id+'\');wpp(\''+l.wpp+'\',\''+nf+'\')">💬</button></div></div></div>';}

function rCli(){const bv=(document.getElementById('busca')||{}).value||'';const m=document.getElementById('mCli');if(VCli==='planos'){m.innerHTML=hPl();return;}if(VCli==='sobre'){m.innerHTML=hSb();return;}let all=LJ.filter(l=>l.ativo);if(CAT!=='todos')all=all.filter(l=>l.cat===CAT);if(bv)all=all.filter(l=>l.nome.toLowerCase().includes(bv.toLowerCase())||l.nf?.toLowerCase().includes(bv.toLowerCase())||(l.posts||[]).some(p=>p.nome.toLowerCase().includes(bv.toLowerCase())));all.sort((a,b)=>(b.dest?1:0)-(a.dest?1:0)||(b.plano==='premium'?1:0)-(a.plano==='premium'?1:0));const atv=LJ.filter(l=>l.ativo);const prm=atv.flatMap(l=>(l.posts||[]).filter(p=>p.promo).map(p=>({...p,ln:l.nf||l.nome,lid:l.id,le:l.emoji,ll:l.logo})));let h='<div class="hero" style="margin-top:8px;"><div class="hero-i">📍</div><div><h2>Compre Local, Apoie Quem É Daqui</h2><p>Lojas de Madre de Deus, São Francisco do Conde e região</p></div></div>';h+='<div class="stats"><div class="stat"><div class="stat-n">'+atv.length+'</div><div class="stat-l">Lojas</div></div><div class="stat"><div class="stat-n">'+prm.length+'</div><div class="stat-l">Promoções</div></div><div class="stat"><div class="stat-n">'+atv.filter(l=>ab(l.abre,l.fecha)).length+'</div><div class="stat-l">Abertas</div></div></div>';if(prm.length){h+='<div class="st">🔥 Promoções</div><div class="pr">'+prm.map(p=>'<div class="pc" onclick="vDet(\''+p.lid+'\')">'+'<div class="pc-img">'+(p.img?'<img src="'+p.img+'">':(p.ll?'<img src="'+p.ll+'">':p.emoji||p.le))+'</div>'+'<div class="pc-b"><div class="pc-n">'+p.nome+'</div><div class="pc-l">'+p.ln+'</div><div class="pc-p">R$ '+p.preco+'</div></div></div>').join('')+'</div>';}if(CAT==='todos'){const cs=Object.keys(CATS).filter(k=>k!=='todos'&&all.some(l=>l.cat===k));if(!cs.length)h+='<div class="empty"><div class="ei">🔍</div><h3>Nenhuma loja</h3></div>';cs.forEach(c=>{const g=all.filter(l=>l.cat===c);h+='<div class="cat-sec"><div class="st">'+CATS[c]+'</div><div class="grid">'+g.map(cCard).join('')+'</div></div>';});}else{h+='<div class="st">'+(CATS[CAT]||'')+'</div>';if(!all.length)h+='<div class="empty"><div class="ei">🔍</div><h3>Nenhuma loja aqui</h3></div>';else h+='<div class="grid">'+all.map(cCard).join('')+'</div>';}m.innerHTML=h;}

function vDet(id){const l=LJ.find(x=>x.id===id);if(!l)return;l.views=(l.views||0)+1;sL();const o=ab(l.abre,l.fecha);const p=PL[l.plano]||PL.gratis;const nf=l.nf||l.nome;const ps=l.posts||[];let h='<div class="det-h"><div class="det-l">'+(l.logo?'<img src="'+l.logo+'">':'<div class="det-le">'+l.emoji+'</div>')+'</div><div class="det-ov">'+(l.nf&&l.nf!==l.nome?'<div class="det-ft">'+l.nf+'</div>':'')+'<div class="det-n">'+l.nome+'</div><div class="det-c">'+(CL[l.cat])+' · <span style="color:'+(o?'#4CAF50':'#EF5350')+'">'+(o?'🟢 Aberto':'🔴 Fechado')+'</span></div><div><span class="det-pb" style="background:'+p.cor+'25;color:'+p.cor+';border:1px solid '+p.cor+'50;">💎 '+p.label+'</span></div></div></div>';h+='<div class="il"><div class="ii"><span class="ii-i">📍</span><span>'+l.end+' — '+l.cidade+'</span></div><div class="ii"><span class="ii-i">🕐</span><span>'+l.abre+' às '+l.fecha+'</span></div>'+(l.desc?'<div class="ii"><span class="ii-i">ℹ️</span><span>'+l.desc+'</span></div>':'')+(l.insta?'<div class="ii"><span class="ii-i">📸</span><span>'+l.insta+'</span></div>':'')+'</div>';if(ps.length){h+='<div class="st">🛍️ Produtos & Serviços</div><div class="pd">'+ps.map(pt=>'<div class="pdc"><div class="pdc-img">'+(pt.img?'<img src="'+pt.img+'">':(pt.emoji||'📦'))+'</div><div class="pdc-b"><div class="pdc-n">'+pt.nome+'</div><div class="pdc-d">'+(pt.desc||'')+'</div><div class="pdc-f">'+(pt.ant?'<span class="pdc-pa">R$ '+pt.ant+'</span>':'')+'<span class="pdc-p">R$ '+pt.preco+'</span>'+(pt.promo?'<span class="tpr">🔥 PROMO</span>':'')+'</div></div></div>').join('')+'</div>';}h+='<button class="bg" onclick="rc(\''+l.id+'\');wpp(\''+l.wpp+'\',\''+nf+'\')">💬 Chamar no WhatsApp</button>';document.getElementById('oDet-b').innerHTML=h;aM('oDet');}
function rc(id){const l=LJ.find(x=>x.id===id);if(l){l.cliques=(l.cliques||0)+1;sL();}}
