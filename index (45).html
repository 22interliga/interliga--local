<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#04183A">
<title>Interliga Local</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600;700&display=swap');
:root{
  --azul:#04183A;--azul2:#0A2560;--laranja:#F5820A;--laranja2:#FF6B00;
  --branco:#FFFFFF;--fundo:#F2F5FB;--borda:#E0E8F5;--texto2:#6B7A99;
  --verde:#25D366;--vermelho:#E53935;--roxo:#7C3AED;
  --sombra:0 2px 20px rgba(4,24,58,0.10);--radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:var(--fundo);color:var(--azul);min-height:100vh;overflow-x:hidden;}
.tela{display:none;min-height:100vh;}
.tela.ativa{display:block;}

/* LOGIN */
#telaLogin{flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;min-height:100vh;background:linear-gradient(160deg,#04183A 0%,#0A2560 60%,#1270C2 100%);}
#telaLogin.ativa{display:flex;}
.splash-star{width:58px;height:58px;background:var(--laranja);clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);margin-bottom:12px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.splash-titulo{font-family:'Bebas Neue',sans-serif;font-size:40px;color:#fff;letter-spacing:2px;line-height:1;}
.splash-titulo span{color:var(--laranja);}
.splash-sub{font-size:13px;color:rgba(255,255,255,.5);margin-top:4px;margin-bottom:32px;letter-spacing:.5px;}
.tipo-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:360px;margin-bottom:24px;}
.tipo-card{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15);border-radius:var(--radius);padding:18px 12px;text-align:center;cursor:pointer;transition:all .2s;}
.tipo-card:hover,.tipo-card.sel{background:rgba(245,130,10,.15);border-color:var(--laranja);}
.tipo-icon{font-size:30px;margin-bottom:6px;}
.tipo-nome{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:15px;color:#fff;}
.tipo-desc{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px;}
.auth-box{width:100%;max-width:360px;}
.auth-tabs{display:flex;background:rgba(255,255,255,.08);border-radius:11px;padding:4px;margin-bottom:18px;}
.auth-tab{flex:1;padding:8px;border:none;background:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;color:rgba(255,255,255,.45);cursor:pointer;transition:all .2s;}
.auth-tab.active{background:var(--laranja);color:#fff;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:11px;font-weight:700;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;}
.field input,.field select{width:100%;padding:11px 13px;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);border-radius:10px;font-family:'Barlow',sans-serif;font-size:15px;color:#fff;outline:none;transition:border-color .2s;}
.field input::placeholder{color:rgba(255,255,255,.3);}
.field input:focus{border-color:var(--laranja);}
.btn-auth{width:100%;padding:13px;background:var(--laranja);color:#fff;border:none;border-radius:11px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;cursor:pointer;margin-top:4px;}
.auth-link{text-align:center;margin-top:12px;font-size:13px;color:rgba(255,255,255,.45);}
.auth-link a{color:var(--laranja);cursor:pointer;font-weight:700;}
.btn-voltar{background:none;border:none;color:rgba(255,255,255,.45);font-size:13px;cursor:pointer;margin-bottom:14px;}

/* HEADER */
.app-header{background:var(--azul);padding:0 16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(4,24,58,.25);}
.app-header-top{display:flex;align-items:center;justify-content:space-between;padding:11px 0;}
.logo-h{display:flex;align-items:center;gap:8px;}
.lstar{width:28px;height:28px;background:var(--laranja);clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);flex-shrink:0;}
.ltxt{font-family:'Bebas Neue',sans-serif;font-size:19px;color:#fff;letter-spacing:1px;line-height:1;}
.ltxt span{color:var(--laranja);}
.hright{display:flex;align-items:center;gap:7px;}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--laranja);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;border:2px solid rgba(255,255,255,.2);overflow:hidden;}
.avatar img{width:100%;height:100%;object-fit:cover;}
.btn-sair{background:rgba(255,255,255,.1);border:none;border-radius:7px;color:rgba(255,255,255,.65);font-size:11px;font-weight:700;padding:5px 9px;cursor:pointer;}
.sw-wrap{padding:9px 0 12px;}
.sw{position:relative;}
.sw input{width:100%;padding:10px 38px 10px 13px;border-radius:10px;border:none;font-family:'Barlow',sans-serif;font-size:14px;background:rgba(255,255,255,.12);color:#fff;outline:none;}
.sw input::placeholder{color:rgba(255,255,255,.4);}
.sw-ic{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.45);pointer-events:none;}

/* TABS */
.tabs{display:flex;gap:7px;overflow-x:auto;padding:10px 16px;background:var(--branco);border-bottom:1px solid var(--borda);scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 12px;border-radius:10px;border:2px solid var(--borda);background:var(--branco);cursor:pointer;white-space:nowrap;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;color:var(--texto2);transition:all .2s;flex-shrink:0;}
.tab .ti{font-size:17px;}
.tab.active{background:var(--azul);border-color:var(--azul);color:#fff;}

/* MAIN */
main{padding:13px 16px 80px;max-width:700px;margin:0 auto;}

/* HERO */
.hero{background:linear-gradient(135deg,var(--laranja),var(--laranja2));border-radius:18px;padding:18px;margin-bottom:16px;color:#fff;display:flex;align-items:center;gap:12px;}
.hero-ic{font-size:40px;flex-shrink:0;}
.hero h2{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.5px;margin-bottom:2px;}
.hero p{font-size:12px;opacity:.9;line-height:1.4;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:16px;}
.stat{background:var(--branco);border-radius:13px;box-shadow:var(--sombra);padding:12px 6px;text-align:center;}
.stat-n{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--laranja);line-height:1;}
.stat-l{font-size:9px;color:var(--texto2);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-top:2px;}

/* SECTION TITLE */
.st{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:17px;color:var(--azul);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.st::after{content:'';flex:1;height:2px;background:var(--borda);border-radius:2px;}
.cat-section{margin-bottom:24px;}

/* PROMOS */
.promo-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;scrollbar-width:none;}
.promo-row::-webkit-scrollbar{display:none;}
.promo-chip{flex-shrink:0;background:var(--branco);border-radius:13px;box-shadow:var(--sombra);width:140px;overflow:hidden;cursor:pointer;border:2px solid #FFF3E0;transition:transform .18s;}
.promo-chip:hover{transform:translateY(-2px);}
.promo-img{width:100%;height:65px;object-fit:cover;background:var(--fundo);display:flex;align-items:center;justify-content:center;font-size:26px;}
.promo-img img{width:100%;height:65px;object-fit:cover;}
.promo-body{padding:7px 9px;}
.promo-nome{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:12px;color:var(--azul);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.promo-loja{font-size:10px;color:var(--texto2);margin-bottom:2px;}
.promo-preco{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--laranja);}

/* CARDS LOJAS */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(min-width:480px){.grid{grid-template-columns:repeat(3,1fr);}}
.card{background:var(--branco);border-radius:var(--radius);box-shadow:var(--sombra);overflow:hidden;cursor:pointer;transition:transform .18s,box-shadow .18s;position:relative;}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(4,24,58,.13);}

/* LOGO DA LOJA */
.card-logo{width:100%;height:90px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:linear-gradient(135deg,var(--azul),#1270C2);}
.card-logo img{width:100%;height:100%;object-fit:cover;}
.card-logo-emoji{font-size:40px;}
.card-logo-fantasia{position:absolute;bottom:0;left:0;right:0;background:rgba(4,24,58,.65);padding:4px 8px;}
.card-logo-fantasia-txt{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:12px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.badge-dest{position:absolute;top:6px;left:6px;background:var(--laranja);color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;z-index:2;}
.badge-plano{position:absolute;top:6px;right:6px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;z-index:2;}
.bp-premium{background:#7C3AED;color:#fff;}
.bp-basico{background:#1270C2;color:#fff;}
.bp-gratis{background:rgba(255,255,255,.85);color:var(--texto2);}

.card-body{padding:9px 10px 10px;}
.card-nome{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:14px;color:var(--azul);margin-bottom:1px;line-height:1.2;}
.card-fantasia{font-size:11px;color:var(--laranja);font-weight:700;margin-bottom:2px;}
.card-cat{font-size:10px;color:var(--texto2);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;}
.card-foot{display:flex;align-items:center;justify-content:space-between;}
.badge-ab{background:#E8F5E9;color:#2E7D32;font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;}
.badge-fe{background:#FFEBEE;color:var(--vermelho);font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;}
.btn-wpp-sm{background:#25D366;border:none;border-radius:7px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;}

/* LOJISTA PAINEL */
.loj-hero{background:linear-gradient(135deg,var(--azul),var(--azul2));border-radius:18px;padding:18px;margin-bottom:14px;color:#fff;}
.loj-hero-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.loj-logo{width:58px;height:58px;border-radius:14px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;overflow:hidden;border:2px solid rgba(255,255,255,.15);}
.loj-logo img{width:100%;height:100%;object-fit:cover;}
.loj-nome{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:.5px;}
.loj-fantasia{font-size:12px;color:var(--laranja);font-weight:700;margin-bottom:2px;}
.loj-plano{font-size:11px;opacity:.65;}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.metric{background:rgba(255,255,255,.08);border-radius:11px;padding:11px 6px;text-align:center;}
.metric-n{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--laranja);line-height:1;}
.metric-l{font-size:9px;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.4px;margin-top:2px;}
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:16px;}
.action-card{background:var(--branco);border-radius:13px;box-shadow:var(--sombra);padding:14px;display:flex;flex-direction:column;gap:6px;cursor:pointer;transition:transform .18s;}
.action-card:hover{transform:translateY(-2px);}
.ac-icon{font-size:24px;}
.ac-nome{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:14px;color:var(--azul);}
.ac-desc{font-size:11px;color:var(--texto2);}

/* UPLOAD LOGO */
.logo-upload-area{border:2px dashed var(--borda);border-radius:14px;padding:20px;text-align:center;cursor:pointer;transition:border-color .2s;margin-bottom:12px;position:relative;}
.logo-upload-area:hover{border-color:var(--laranja);}
.logo-preview{width:90px;height:90px;border-radius:14px;margin:0 auto 10px;overflow:hidden;background:var(--fundo);display:flex;align-items:center;justify-content:center;font-size:36px;}
.logo-preview img{width:100%;height:100%;object-fit:cover;}
.logo-upload-txt{font-size:13px;color:var(--texto2);font-weight:600;}
.logo-upload-sub{font-size:11px;color:var(--borda);margin-top:3px;}
input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}

/* POST LOJISTA */
.post-lj{background:var(--branco);border-radius:13px;box-shadow:var(--sombra);overflow:hidden;display:flex;margin-bottom:9px;position:relative;}
.post-lj-img{width:82px;height:82px;background:var(--fundo);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;overflow:hidden;}
.post-lj-img img{width:100%;height:100%;object-fit:cover;}
.post-lj-body{padding:9px 11px;flex:1;}
.post-lj-nome{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:14px;color:var(--azul);}
.post-lj-preco{font-family:'Bebas Neue',sans-serif;font-size:19px;color:var(--laranja);}
.post-lj-ant{font-size:11px;color:var(--texto2);text-decoration:line-through;margin-right:3px;}
.tag-promo{background:#FFF3E0;color:var(--laranja);font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;border:1px solid #FFD0A0;}
.post-acts{position:absolute;top:7px;right:7px;display:flex;gap:4px;}
.btn-mini{padding:4px 8px;border-radius:6px;border:none;font-size:10px;font-weight:700;cursor:pointer;}
.bm-edit{background:#E3F2FD;color:#1565C0;}
.bm-del{background:#FFEBEE;color:var(--vermelho);}

/* PLANOS */
.plano-row{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px;}
.plano{border-radius:15px;padding:14px 10px;text-align:center;border:2px solid var(--borda);background:var(--branco);position:relative;cursor:pointer;}
.plano.pop{border-color:var(--laranja);background:linear-gradient(160deg,#FFF8F0,#FFF);}
.plano.pop::before{content:'POPULAR';position:absolute;top:-9px;left:50%;transform:translateX(-50%);background:var(--laranja);color:#fff;font-size:8px;font-weight:700;padding:2px 9px;border-radius:20px;}
.plano-n{font-family:'Bebas Neue',sans-serif;font-size:18px;margin-bottom:3px;}
.plano-p{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--laranja);}
.plano-p sub{font-size:11px;font-family:'Barlow',sans-serif;color:var(--texto2);font-weight:400;}
.plano-ul{text-align:left;margin:8px 0;font-size:10px;display:flex;flex-direction:column;gap:3px;}
.plano-ul li{list-style:none;}
.btn-plano{width:100%;padding:7px;background:var(--azul);color:#fff;border:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;cursor:pointer;margin-top:5px;}
.plano.pop .btn-plano{background:var(--laranja);}

/* ADMIN */
.adm-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:14px;}
.adm-stat{background:var(--branco);border-radius:11px;box-shadow:var(--sombra);padding:11px 6px;text-align:center;}
.adm-stat-n{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--laranja);line-height:1;}
.adm-stat-l{font-size:9px;color:var(--texto2);font-weight:700;text-transform:uppercase;letter-spacing:.3px;}
.adm-row{background:var(--branco);border-radius:13px;box-shadow:var(--sombra);padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.adm-icon{width:42px;height:42px;border-radius:10px;background:var(--fundo);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden;}
.adm-icon img{width:100%;height:100%;object-fit:cover;border-radius:10px;}
.adm-info{flex:1;}
.adm-nome{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:14px;color:var(--azul);}
.adm-fantasia{font-size:11px;color:var(--laranja);font-weight:700;}
.adm-sub{font-size:10px;color:var(--texto2);}
.adm-acts{display:flex;gap:4px;flex-wrap:wrap;}

/* DETALHE */
.det-header{border-radius:18px;overflow:hidden;margin-bottom:13px;position:relative;}
.det-logo{width:100%;height:140px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--azul),#1270C2);}
.det-logo img{width:100%;height:100%;object-fit:cover;}
.det-logo-emoji{font-size:56px;}
.det-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(4,24,58,.85));padding:16px;}
.det-nome{font-family:'Bebas Neue',sans-serif;font-size:26px;color:#fff;letter-spacing:.5px;line-height:1;}
.det-fantasia{font-size:13px;color:var(--laranja);font-weight:700;margin-bottom:3px;}
.det-cat{font-size:11px;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.8px;}
.det-plano-b{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-top:6px;}
.info-l{margin-bottom:12px;}
.ii{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--borda);font-size:13px;}
.ii:last-child{border-bottom:none;}
.ii-ic{font-size:15px;width:20px;text-align:center;}
.posts-det{display:flex;flex-direction:column;gap:8px;margin-bottom:13px;}
.post-det{background:var(--fundo);border-radius:12px;overflow:hidden;display:flex;}
.post-det-img{width:80px;height:80px;background:var(--borda);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;overflow:hidden;}
.post-det-img img{width:100%;height:80px;object-fit:cover;}
.post-det-body{padding:9px 11px;flex:1;}
.post-det-nome{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:14px;color:var(--azul);margin-bottom:2px;}
.post-det-desc{font-size:11px;color:var(--texto2);margin-bottom:5px;}
.post-det-foot{display:flex;align-items:center;gap:7px;}
.post-det-preco{font-family:'Bebas Neue',sans-serif;font-size:19px;color:var(--laranja);}
.post-det-ant{font-size:11px;color:var(--texto2);text-decoration:line-through;}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(4,24,58,.55);z-index:300;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--branco);border-radius:20px 20px 0 0;width:100%;max-width:700px;max-height:93vh;overflow-y:auto;padding:20px 17px 30px;animation:su .26s ease;position:relative;}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhandle{width:36px;height:4px;background:var(--borda);border-radius:4px;margin:0 auto 14px;}
.mtitle{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--azul);margin-bottom:14px;letter-spacing:.4px;}
.mclose{position:absolute;top:15px;right:15px;background:var(--fundo);border:none;border-radius:50%;width:30px;height:30px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--azul);}
.fg{margin-bottom:11px;}
.fl{display:block;font-weight:700;font-size:11px;color:var(--azul);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;}
.fi{width:100%;padding:10px 12px;border:2px solid var(--borda);border-radius:10px;font-family:'Barlow',sans-serif;font-size:14px;color:var(--azul);outline:none;transition:border-color .2s;background:var(--fundo);}
.fi:focus{border-color:var(--laranja);background:var(--branco);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-p{width:100%;padding:12px;background:var(--azul);color:#fff;border:none;border-radius:11px;font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:.4px;cursor:pointer;margin-top:4px;}
.btn-o{width:100%;padding:12px;background:var(--laranja);color:#fff;border:none;border-radius:11px;font-family:'Bebas Neue',sans-serif;font-size:19px;cursor:pointer;margin-top:6px;}
.btn-g{width:100%;padding:12px;background:#25D366;color:#fff;border:none;border-radius:11px;font-family:'Bebas Neue',sans-serif;font-size:19px;cursor:pointer;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:7px;}

/* EMOJI */
.emoji-g{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.eo{cursor:pointer;font-size:21px;padding:4px;border-radius:7px;border:2px solid transparent;}
.eo:hover{border-color:var(--borda);}
.eo.sel{border-color:var(--laranja);}
select.fi{appearance:none;}

/* PIX */
.pix-box{background:#F0FFF4;border-radius:12px;padding:13px;margin-bottom:12px;border:1.5px solid #A5D6A7;}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--branco);border-top:1px solid var(--borda);display:flex;z-index:200;box-shadow:0 -2px 14px rgba(4,24,58,.07);}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0;cursor:pointer;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--texto2);border:none;background:none;}
.bni .ni{font-size:20px;}
.bni.active{color:var(--laranja);}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--azul);color:#fff;padding:10px 20px;border-radius:28px;font-weight:700;font-size:13px;z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.empty{text-align:center;padding:32px 14px;color:var(--texto2);}
.empty .ei{font-size:46px;margin-bottom:9px;}
.empty h3{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;color:var(--azul);margin-bottom:4px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="telaLogin" class="tela">
  <div class="splash-star"></div>
  <div class="splash-titulo">INTERLIGA <span>LOCAL</span></div>
  <div class="splash-sub">Comércio local na palma da mão</div>

  <div id="blocoTipo" style="width:100%;max-width:360px;">
    <div style="font-size:12px;color:rgba(255,255,255,.45);margin-bottom:12px;text-align:center;">Como você quer entrar?</div>
    <div class="tipo-grid">
      <div class="tipo-card" onclick="escolherTipo('cliente')">
        <div class="tipo-icon">🛍️</div>
        <div class="tipo-nome">Quero Comprar</div>
        <div class="tipo-desc">Explorar lojas locais</div>
      </div>
      <div class="tipo-card" onclick="escolherTipo('lojista')">
        <div class="tipo-icon">🏪</div>
        <div class="tipo-nome">Sou Lojista</div>
        <div class="tipo-desc">Gerenciar minha loja</div>
      </div>
    </div>
    <div style="text-align:center;"><a style="font-size:12px;color:rgba(255,255,255,.4);cursor:pointer;" onclick="escolherTipo('cliente')">Entrar sem cadastro →</a></div>
  </div>

  <div id="blocoAuth" style="display:none;" class="auth-box">
    <button class="btn-voltar" onclick="voltarTipo()">← Voltar</button>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="setAuthTab('entrar',this)">Entrar</button>
      <button class="auth-tab" onclick="setAuthTab('cadastrar',this)">Cadastrar</button>
    </div>
    <div id="formEntrar">
      <div class="field"><label>WhatsApp / Usuário</label><input id="e_user" placeholder="71 9xxxx-xxxx ou admin"></div>
      <div class="field"><label>Senha</label><input type="password" id="e_senha" placeholder="••••••"></div>
      <button class="btn-auth" onclick="fazerLogin()">ENTRAR</button>
    </div>
    <div id="formCad" style="display:none;">
      <div class="field"><label>Seu Nome *</label><input id="r_nome" placeholder="Nome completo"></div>
      <div class="field"><label>WhatsApp *</label><input id="r_wpp" placeholder="71 9xxxx-xxxx" type="tel"></div>
      <div class="field"><label>Senha *</label><input type="password" id="r_senha" placeholder="Crie uma senha"></div>
      <button class="btn-auth" onclick="fazerCadastro()">CRIAR CONTA</button>
    </div>
    <div class="auth-link" id="authLink">Não tem conta? <a onclick="setAuthTab('cadastrar',document.querySelectorAll('.auth-tab')[1])">Cadastre-se grátis</a></div>
  </div>
</div>

<!-- CLIENTE -->
<div id="telaCliente" class="tela">
  <header class="app-header">
    <div class="app-header-top">
      <div class="logo-h"><div class="lstar"></div><div class="ltxt">INTERLIGA <span>LOCAL</span></div></div>
      <div class="hright"><div class="avatar">🛍️</div><button class="btn-sair" onclick="sair()">Sair</button></div>
    </div>
    <div class="sw-wrap"><div class="sw"><input id="busca" placeholder="Buscar lojas, produtos, promoções..." oninput="renderCliente()"><span class="sw-ic">🔍</span></div></div>
  </header>
  <div class="tabs" id="tabsCli">
    <button class="tab active" onclick="setTab('todos',this)"><span class="ti">🏠</span>Todos</button>
    <button class="tab" onclick="setTab('mercado',this)"><span class="ti">🛒</span>Mercados</button>
    <button class="tab" onclick="setTab('moda',this)"><span class="ti">👗</span>Moda</button>
    <button class="tab" onclick="setTab('pet',this)"><span class="ti">🐾</span>Pets</button>
    <button class="tab" onclick="setTab('servico',this)"><span class="ti">🔧</span>Serviços</button>
    <button class="tab" onclick="setTab('alimentacao',this)"><span class="ti">🍽️</span>Alimentação</button>
    <button class="tab" onclick="setTab('saude',this)"><span class="ti">💊</span>Saúde</button>
    <button class="tab" onclick="setTab('beleza',this)"><span class="ti">💅</span>Beleza</button>
    <button class="tab" onclick="setTab('eletro',this)"><span class="ti">📱</span>Eletrônicos</button>
    <button class="tab" onclick="setTab('otica',this)"><span class="ti">👓</span>Óticas</button>
  </div>
  <main id="mainCli"></main>
  <nav class="bnav">
    <button class="bni active" onclick="setViewCli('home',this)"><span class="ni">🏠</span>Início</button>
    <button class="bni" onclick="setViewCli('promos',this)"><span class="ni">🔥</span>Promoções</button>
    <button class="bni" onclick="setViewCli('planos',this)"><span class="ni">💎</span>Planos</button>
    <button class="bni" onclick="setViewCli('sobre',this)"><span class="ni">ℹ️</span>Sobre</button>
  </nav>
</div>

<!-- LOJISTA -->
<div id="telaLojista" class="tela">
  <header class="app-header">
    <div class="app-header-top">
      <div class="logo-h"><div class="lstar"></div><div class="ltxt">INTERLIGA <span>LOCAL</span></div></div>
      <div class="hright"><div class="avatar" id="avatarLoj">🏪</div><button class="btn-sair" onclick="sair()">Sair</button></div>
    </div>
  </header>
  <main id="mainLoj" style="padding:13px 16px 80px;max-width:700px;margin:0 auto;"></main>
  <nav class="bnav">
    <button class="bni active" onclick="setViewLoj('dash',this)"><span class="ni">📊</span>Dashboard</button>
    <button class="bni" onclick="setViewLoj('posts',this)"><span class="ni">🖼️</span>Posts</button>
    <button class="bni" onclick="setViewLoj('dados',this)"><span class="ni">✏️</span>Dados</button>
    <button class="bni" onclick="setViewLoj('plano',this)"><span class="ni">💎</span>Plano</button>
  </nav>
</div>

<!-- ADMIN -->
<div id="telaAdmin" class="tela">
  <header class="app-header">
    <div class="app-header-top">
      <div class="logo-h"><div class="lstar"></div><div class="ltxt">INTERLIGA <span>LOCAL</span></div></div>
      <div class="hright"><div class="avatar">⚙️</div><button class="btn-sair" onclick="sair()">Sair</button></div>
    </div>
  </header>
  <main id="mainAdm" style="padding:13px 16px 80px;max-width:700px;margin:0 auto;"></main>
  <nav class="bnav">
    <button class="bni active" onclick="setViewAdm('lojas',this)"><span class="ni">🏪</span>Lojas</button>
    <button class="bni" onclick="setViewAdm('pendentes',this)"><span class="ni">⏳</span>Pendentes</button>
    <button class="bni" onclick="setViewAdm('relatorio',this)"><span class="ni">📊</span>Relatório</button>
    <button class="bni" onclick="setViewAdm('config',this)"><span class="ni">⚙️</span>Config</button>
  </nav>
</div>

<!-- MODAIS -->
<div class="overlay" id="mDet"><div class="modal"><button class="mclose" onclick="fecharM('mDet')">✕</button><div class="mhandle"></div><div id="mDetBody"></div></div></div>
<div class="overlay" id="mPost"><div class="modal"><button class="mclose" onclick="fecharM('mPost')">✕</button><div class="mhandle"></div><div id="mPostBody"></div></div></div>
<div class="overlay" id="mCad"><div class="modal"><button class="mclose" onclick="fecharM('mCad')">✕</button><div class="mhandle"></div><div id="mCadBody"></div></div></div>

<div class="toast" id="toast"></div>

<script>
const CATS={todos:'Todos',mercado:'🛒 Mercados',moda:'👗 Moda & Roupas',pet:'🐾 Pet Shop',servico:'🔧 Serviços',alimentacao:'🍽️ Alimentação',saude:'💊 Saúde & Farmácia',beleza:'💅 Beleza & Estética',eletro:'📱 Eletrônicos',otica:'👓 Óticas'};
const CATS_LABEL={mercado:'Mercado',moda:'Moda',pet:'Pet',servico:'Serviços',alimentacao:'Alimentação',saude:'Saúde',beleza:'Beleza',eletro:'Eletrônicos',otica:'Ótica'};
const PLANOS={gratis:{label:'Grátis',cor:'#6B7A99',maxPosts:0,preco:0},basico:{label:'Básico',cor:'#1270C2',maxPosts:5,preco:29},premium:{label:'Premium',cor:'#7C3AED',maxPosts:10,preco:59}};
const EMOJIS=['🛒','👗','🐾','🔧','🍽️','💊','💅','📱','👓','🏪','💈','🐶','🍕','🥩','🧴','👟','💻','🎂','🌿','🧹','💇','📦','🎁','🚗'];

let usuarios=JSON.parse(localStorage.getItem('il_users')||'[]');
let lojas=JSON.parse(localStorage.getItem('il_lojas')||'[]');
let userAtual=null,catAtiva='todos',viewCli='home',postEditIdx=null;

// DADOS DEMO
if(!usuarios.length){
  usuarios=[
    {id:'u1',nome:'Miquéias',wpp:'71981899571',senha:'interliga2025',tipo:'admin'},
    {id:'u2',nome:'Ótica Lclass',wpp:'71981899572',senha:'lclass123',tipo:'lojista',lojaId:'l2'}
  ];
  salvarU();
}
if(!lojas.length){
  lojas=[
    {id:'l1',nome:'Mais Supermercados',nomeFantasia:'Mais Supermercados',cat:'mercado',emoji:'🛒',logo:'',cidade:'Madre de Deus',endereco:'Av. Central, Centro',wpp:'71981890001',insta:'@maissupermercados',abre:'07:00',fecha:'21:00',desc:'Supermercado completo com hortifruti, açougue e padaria.',plano:'premium',ativo:true,destaque:true,views:142,cliques:38,
     posts:[{nome:'Frango Inteiro',desc:'Resfriado, por kg',preco:'8.99',precoAnt:'',promo:false,emoji:'🍗',img:''},{nome:'Arroz 5kg',desc:'Tipo 1, marca premium',preco:'19.90',precoAnt:'24.90',promo:true,emoji:'🌾',img:''},{nome:'Refrigerante 2L',desc:'Coca-Cola ou Pepsi',preco:'7.49',precoAnt:'9.99',promo:true,emoji:'🥤',img:''}]},
    {id:'l2',nome:'Ótica Lclass',nomeFantasia:'Lclass Óptica',cat:'otica',emoji:'👓',logo:'',cidade:'Madre de Deus',endereco:'Rua Principal, Centro',wpp:'71981899571',insta:'@oticalclass',abre:'08:00',fecha:'18:00',desc:'Óculos de grau, solar e lentes. Exame de vista gratuito.',plano:'basico',ativo:true,destaque:false,views:89,cliques:21,
     posts:[{nome:'Óculos de Grau',desc:'Armações variadas',preco:'89.00',precoAnt:'',promo:false,emoji:'👓',img:''},{nome:'Lentes Anti-Reflexo',desc:'Par completo',preco:'149.00',precoAnt:'199.00',promo:true,emoji:'✨',img:''}]},
    {id:'l3',nome:'Pet Amor',nomeFantasia:'Pet Amor',cat:'pet',emoji:'🐾',logo:'',cidade:'São Francisco do Conde',endereco:'Av. Principal, 123',wpp:'71999990000',insta:'@petamor',abre:'08:00',fecha:'17:00',desc:'Rações, banho e tosa, acessórios para pets.',plano:'gratis',ativo:true,destaque:false,views:33,cliques:8,posts:[]}
  ];
  salvarL();
}

function salvarU(){localStorage.setItem('il_users',JSON.stringify(usuarios));}
function salvarL(){localStorage.setItem('il_lojas',JSON.stringify(lojas));}

// ── AUTH ──
function escolherTipo(t){
  if(t==='cliente'){userAtual={tipo:'cliente',nome:'Explorador',id:'anon'};irTela('telaCliente');renderCliente();return;}
  document.getElementById('blocoTipo').style.display='none';
  document.getElementById('blocoAuth').style.display='block';
}
function voltarTipo(){document.getElementById('blocoTipo').style.display='block';document.getElementById('blocoAuth').style.display='none';}
function setAuthTab(t,btn){
  document.querySelectorAll('.auth-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  document.getElementById('formEntrar').style.display=t==='entrar'?'block':'none';
  document.getElementById('formCad').style.display=t==='cadastrar'?'block':'none';
  document.getElementById('authLink').style.display=t==='entrar'?'block':'none';
}
function fazerLogin(){
  const u=document.getElementById('e_user').value.trim(),s=document.getElementById('e_senha').value;
  if(!u||!s){toast('⚠️ Preencha usuário e senha.');return;}
  const usr=usuarios.find(x=>(x.wpp===u.replace(/\D/g,'')||u==='admin'||u===x.nome)&&x.senha===s);
  if(!usr){toast('❌ Usuário ou senha incorretos.');return;}
  userAtual=usr;
  if(usr.tipo==='admin'){irTela('telaAdmin');renderAdmin('lojas');}
  else if(usr.tipo==='lojista'){
    const lj=lojas.find(l=>l.id===usr.lojaId);
    if(lj){const av=document.getElementById('avatarLoj');if(lj.logo){av.innerHTML=`<img src="${lj.logo}">`;av.style.padding='0';}else av.textContent=lj.emoji;}
    irTela('telaLojista');renderLoj('dash');
  } else {irTela('telaCliente');renderCliente();}
}
function fazerCadastro(){
  const nome=document.getElementById('r_nome').value.trim(),wpp=document.getElementById('r_wpp').value.replace(/\D/g,''),senha=document.getElementById('r_senha').value;
  if(!nome||!wpp||!senha){toast('⚠️ Preencha todos os campos.');return;}
  if(usuarios.find(u=>u.wpp===wpp)){toast('⚠️ WhatsApp já cadastrado.');return;}
  const novo={id:'u'+Date.now(),nome,wpp,senha,tipo:'lojista',lojaId:null};
  usuarios.push(novo);salvarU();userAtual=novo;
  irTela('telaLojista');renderLoj('dash');
  toast('✅ Conta criada! Cadastre sua loja.');
  setTimeout(()=>abrirCadLoja(false),800);
}
function sair(){userAtual=null;irTela('telaLogin');document.getElementById('blocoTipo').style.display='block';document.getElementById('blocoAuth').style.display='none';}
function irTela(id){document.querySelectorAll('.tela').forEach(t=>t.classList.remove('ativa'));document.getElementById(id).classList.add('ativa');}

// ── CLIENTE ──
function renderCliente(){
  const busca=(document.getElementById('busca')||{}).value||'';
  const m=document.getElementById('mainCli');
  if(viewCli==='planos'){m.innerHTML=htmlPlanos();return;}
  if(viewCli==='sobre'){m.innerHTML=htmlSobre();return;}

  let todas=lojas.filter(l=>l.ativo);
  if(catAtiva!=='todos') todas=todas.filter(l=>l.cat===catAtiva);
  if(busca) todas=todas.filter(l=>l.nome.toLowerCase().includes(busca.toLowerCase())||l.nomeFantasia?.toLowerCase().includes(busca.toLowerCase())||l.desc?.toLowerCase().includes(busca.toLowerCase())||(l.posts||[]).some(p=>p.nome.toLowerCase().includes(busca.toLowerCase())));
  todas.sort((a,b)=>(b.destaque?1:0)-(a.destaque?1:0)||(b.plano==='premium'?1:0)-(a.plano==='premium'?1:0));

  const atv=lojas.filter(l=>l.ativo);
  const promos=atv.flatMap(l=>(l.posts||[]).filter(p=>p.promo).map(p=>({...p,lNome:l.nomeFantasia||l.nome,lid:l.id,lEmoji:l.emoji,lLogo:l.logo})));

  let html=`
    <div class="hero" style="margin-top:8px;">
      <div class="hero-ic">📍</div>
      <div><h2>Compre Local, Apoie Quem É Daqui</h2><p>Lojas de Madre de Deus, São Francisco do Conde e região</p></div>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-n">${atv.length}</div><div class="stat-l">Lojas</div></div>
      <div class="stat"><div class="stat-n">${promos.length}</div><div class="stat-l">Promoções</div></div>
      <div class="stat"><div class="stat-n">${atv.filter(l=>estaAberto(l.abre,l.fecha)).length}</div><div class="stat-l">Abertas</div></div>
    </div>`;

  if(promos.length){
    html+=`<div class="st">🔥 Promoções em Destaque</div>
    <div class="promo-row">${promos.map(p=>`
      <div class="promo-chip" onclick="verDetalhe('${p.lid}')">
        <div class="promo-img">${p.img?`<img src="${p.img}">`:(p.logo?`<img src="${p.logo}">`:p.emoji||p.lEmoji)}</div>
        <div class="promo-body">
          <div class="promo-nome">${p.nome}</div>
          <div class="promo-loja">${p.lNome}</div>
          <div class="promo-preco">R$ ${p.preco}</div>
        </div>
      </div>`).join('')}</div>`;
  }

  if(catAtiva==='todos'){
    // Por categoria separado
    const catsComLojas=Object.keys(CATS).filter(k=>k!=='todos'&&todas.some(l=>l.cat===k));
    if(!catsComLojas.length){html+=`<div class="empty"><div class="ei">🔍</div><h3>Nenhuma loja encontrada</h3><p>Tente outra busca.</p></div>`;}
    catsComLojas.forEach(cat=>{
      const grupo=todas.filter(l=>l.cat===cat);
      html+=`<div class="cat-section"><div class="st">${CATS[cat]}</div><div class="grid">${grupo.map(l=>cardLoja(l)).join('')}</div></div>`;
    });
  } else {
    html+=`<div class="st">${CATS[catAtiva]||''}</div>`;
    if(!todas.length) html+=`<div class="empty"><div class="ei">🔍</div><h3>Nenhuma loja aqui</h3><p>Seja o primeiro!</p></div>`;
    else html+=`<div class="grid">${todas.map(l=>cardLoja(l)).join('')}</div>`;
  }

  m.innerHTML=html;
}

function cardLoja(l){
  const ab=estaAberto(l.abre,l.fecha);
  const pl=PLANOS[l.plano]||PLANOS.gratis;
  const nf=l.nomeFantasia||l.nome;
  return`<div class="card" onclick="verDetalhe('${l.id}')">
    <div class="card-logo">
      ${l.logo?`<img src="${l.logo}">`:`<div class="card-logo-emoji">${l.emoji}</div>`}
      ${l.destaque?'<div class="badge-dest">⭐ Destaque</div>':''}
      <div class="badge-plano bp-${l.plano||'gratis'}">${pl.label}</div>
      ${l.nomeFantasia&&l.logo?`<div class="card-logo-fantasia"><div class="card-logo-fantasia-txt">${nf}</div></div>`:''}
    </div>
    <div class="card-body">
      <div class="card-nome">${l.nome}</div>
      ${l.nomeFantasia&&l.nomeFantasia!==l.nome?`<div class="card-fantasia">${l.nomeFantasia}</div>`:''}
      <div class="card-cat">${CATS_LABEL[l.cat]||l.cat} · ${l.cidade}</div>
      <div class="card-foot">
        <span class="${ab?'badge-ab':'badge-fe'}">${ab?'Aberto':'Fechado'}</span>
        <button class="btn-wpp-sm" onclick="event.stopPropagation();regClique('${l.id}');abrirWpp('${l.wpp}','${nf}')">💬</button>
      </div>
    </div>
  </div>`;
}

function verDetalhe(id){
  const l=lojas.find(x=>x.id===id);if(!l) return;
  l.views=(l.views||0)+1;salvarL();
  const ab=estaAberto(l.abre,l.fecha);
  const pl=PLANOS[l.plano]||PLANOS.gratis;
  const nf=l.nomeFantasia||l.nome;
  const posts=l.posts||[];
  document.getElementById('mDetBody').innerHTML=`
    <div class="det-header">
      <div class="det-logo">
        ${l.logo?`<img src="${l.logo}">`:`<div class="det-logo-emoji">${l.emoji}</div>`}
      </div>
      <div class="det-overlay">
        ${l.nomeFantasia&&l.nomeFantasia!==l.nome?`<div class="det-fantasia">${l.nomeFantasia}</div>`:''}
        <div class="det-nome">${l.nome}</div>
        <div class="det-cat">${CATS_LABEL[l.cat]} · <span style="color:${ab?'#4CAF50':'#EF5350'}">${ab?'🟢 Aberto':'🔴 Fechado'}</span></div>
        <div><span class="det-plano-b" style="background:${pl.cor}30;color:${pl.cor};border:1px solid ${pl.cor}50;">💎 ${pl.label}</span></div>
      </div>
    </div>
    <div class="info-l">
      <div class="ii"><span class="ii-ic">📍</span><span>${l.endereco} — ${l.cidade}</span></div>
      <div class="ii"><span class="ii-ic">🕐</span><span>${l.abre} às ${l.fecha}</span></div>
      ${l.desc?`<div class="ii"><span class="ii-ic">ℹ️</span><span>${l.desc}</span></div>`:''}
      ${l.insta?`<div class="ii"><span class="ii-ic">📸</span><span>${l.insta}</span></div>`:''}
    </div>
    ${posts.length?`<div class="st">🛍️ Produtos & Serviços</div>
    <div class="posts-det">
      ${posts.map(p=>`<div class="post-det">

  const imgAtual=p.img?`<img src="${p.img}">`:(p.emoji||'📦');
  document.getElementById('mPostBody').innerHTML=`
    <div class="mtitle">${idx!=null?'✏️ Editar Post':'➕ Novo Post'}</div>

    </div>
    <input type="hidden" id="pf_img" value="${p.img||''}">
    <div class="fg"><label class="fl">Nome *</label><input class="fi" id="pf_nome" value="${p.nome}" placeholder="Ex: Camiseta Polo"></div>
    <div class="fg"><label class="fl">Descrição</label><input class="fi" id="pf_desc" value="${p.desc||''}" placeholder="Breve descrição"></div>
    <div class="frow">
      <div class="fg"><label class="fl">Preço (R$) *</label><input type="number" step="0.01" class="fi" id="pf_preco" value="${p.preco}" placeholder="0,00"></div>
      <div class="fg"><label class="fl">Preço Antigo</label><input type="number" step="0.01" class="fi" id="pf_ant" value="${p.precoAnt||''}" placeholder="Opcional"></div>
    </div>
    <div class="fg"><label class="fl">Emoji (sem foto)</label>
      <div class="emoji-g">${EMOJIS.map(e=>`<span class="eo${p.emoji===e?' sel':''}" onclick="selEmoji(this,'pf_emoji')">${e}</span>`).join('')}</div>
      <input type="hidden" id="pf_emoji" value="${p.emoji||'📦'}">
    </div>
    <div style="display:flex;align-items:center;gap:9px;padding:11px;background:var(--fundo);border-radius:10px;margin-bottom:5px;">
      <input type="checkbox" id="pf_promo" ${p.promo?'checked':''} style="width:17px;height:17px;accent-color:var(--laranja);">
      <label for="pf_promo" style="font-weight:700;font-size:13px;cursor:pointer;">🔥 Marcar como Promoção</label>
    </div>
    <button class="btn-p" onclick="salvarPost()">✅ Salvar Post</button>`;
  abrirM('mPost');
}

function salvarPost(){
  const lj=getLoja();if(!lj) return;
  const nome=document.getElementById('pf_nome').value.trim(),preco=document.getElementById('pf_preco').value;
  if(!nome||!preco){toast('⚠️ Nome e preço obrigatórios.');return;}
  const p={nome,desc:document.getElementById('pf_desc').value.trim(),preco,precoAnt:document.getElementById('pf_ant').value||'',emoji:document.getElementById('pf_emoji').value||'📦',promo:document.getElementById('pf_promo').checked,img:document.getElementById('pf_img').value||''};
  if(!lj.posts) lj.posts=[];
  if(postEditIdx!=null) lj.posts[postEditIdx]=p; else lj.posts.push(p);
  salvarL();fecharM('mPost');renderLoj('posts');toast('✅ Post salvo!');
}

function deletarPost(i){if(!confirm('Remover este post?'))return;const lj=getLoja();lj.posts.splice(i,1);salvarL();renderLoj('posts');toast('🗑️ Removido.');}

function salvarDados(){
  const lj=getLoja();if(!lj) return;
  lj.nome=document.getElementById('ed_nome').value.trim()||lj.nome;
  lj.nomeFantasia=document.getElementById('ed_fantasia').value.trim()||lj.nome;
  lj.cat=document.getElementById('ed_cat').value;
  lj.cidade=document.getElementById('ed_cidade').value;
  lj.endereco=document.getElementById('ed_end').value.trim();
  lj.wpp=document.getElementById('ed_wpp').value.replace(/\D/g,'');
  lj.insta=document.getElementById('ed_insta').value.trim();
  lj.abre=document.getElementById('ed_abre').value;
  lj.fecha=document.getElementById('ed_fecha').value;
  lj.desc=document.getElementById('ed_desc').value.trim();
  lj.emoji=document.getElementById('ed_emoji').value||lj.emoji;
  lj.logo=document.getElementById('ed_logo').value||lj.logo||'';
  // Atualizar avatar
  const av=document.getElementById('avatarLoj');
  if(lj.logo){av.innerHTML=`<img src="${lj.logo}">`;av.style.padding='0';}else av.textContent=lj.emoji;
  salvarL();toast('✅ Dados atualizados!');renderLoj('dados');
}

function solicitarUpgrade(p){
  const pl=PLANOS[p],lj=getLoja();
  const msg=encodeURIComponent(`Olá! Quero upgrade para o plano *${pl.label}* (R$${pl.preco}/mês).\nMinha loja: *${lj?.nome||'—'}*`);
  window.open(`https://wa.me/5571981899571?text=${msg}`,'_blank');
}

function compartilharLoja(){
  const lj=getLoja();if(!lj) return;
  const nf=lj.nomeFantasia||lj.nome;
  const msg=encodeURIComponent(`🌟 *${nf}* está no Interliga Local!\nEncontre lojas da sua região:\nhttps://22interliga.github.io/interliga-local/`);
  window.open(`https://wa.me/?text=${msg}`,'_blank');
}

function salvarCadLoja(isAdmin){
  const nome=document.getElementById('cad_nome').value.trim();
  const cat=document.getElementById('cad_cat').value;
  const cidade=document.getElementById('cad_cidade').value;
  const wpp=document.getElementById('cad_wpp').value.replace(/\D/g,'');
  if(!nome||!cat||!cidade||!wpp){toast('⚠️ Preencha os campos obrigatórios.');return;}
  const nova={
    id:'l'+Date.now(),nome,nomeFantasia:document.getElementById('cad_fantasia').value.trim()||nome,cat,cidade,
    endereco:document.getElementById('cad_end').value.trim(),wpp,
    insta:document.getElementById('cad_insta').value.trim(),
    abre:document.getElementById('cad_abre').value,fecha:document.getElementById('cad_fecha').value,
    desc:document.getElementById('cad_desc').value.trim(),
    emoji:document.getElementById('cad_emoji').value||'🏪',
    logo:document.getElementById('cad_logo').value||'',
    plano:isAdmin?(document.getElementById('cad_plano')?.value||'gratis'):'gratis',
    ativo:isAdmin,destaque:false,views:0,cliques:0,posts:[]
  };
  lojas.push(nova);salvarL();
  if(!isAdmin&&userAtual){userAtual.lojaId=nova.id;salvarU();}
  fecharM('mCad');
  if(isAdmin){renderAdmin('lojas');toast('✅ Loja cadastrada!');}
  else{renderLoj('dash');toast('✅ Cadastrada! Aguardando aprovação.');}
}

// PROCESSAR LOGO/IMAGEM
function processarLogo(event,inputId,previewId){
  const file=event.target.files[0];if(!file) return;
  if(file.size>2*1024*1024){toast('⚠️ Imagem muito grande. Máx 2MB.');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    const data=e.target.result;
    document.getElementById(inputId).value=data;
    const prev=document.getElementById(previewId||'logoPreview');
    if(prev) prev.innerHTML=`<img src="${data}">`;
  };
  reader.readAsDataURL(file);
}

function estaAberto(a,f){const n=new Date(),h=n.getHours()*60+n.getMinutes();const[ah,am]=a.split(':').map(Number),[fh,fm]=f.split(':').map(Number);return h>=ah*60+am&&h<fh*60+fm;}
